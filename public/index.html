<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Chat App</title>
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem;
			}

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 200px);
				min-height: 400px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background-color: var(--light-bg);
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 80%;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				margin-left: auto;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
			}

			.message-input {
				display: flex;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				resize: none;
				min-height: 44px;
			}

			#send-button {
				margin-left: 0.5rem;
				padding: 0 1rem;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				transition: background-color 0.2s;
			}

			#send-button:hover {
				background-color: var(--primary-hover);
			}

			#newChatButton:hover {
				background-color: var(--primary-hover);
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-light);
				padding: 1rem;
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				margin-top: 1rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
			}

			/* Copy button styles */
			.message {
				position: relative;
			}

			.copy-button {
				position: absolute;
				top: 0.5rem;
				right: 0.5rem;
				background: rgba(255, 255, 255, 0.8);
				border: 1px solid var(--border-color);
				border-radius: 4px;
				padding: 0.25rem 0.5rem;
				font-size: 0.75rem;
				cursor: pointer;
				opacity: 0;
				transition: opacity 0.2s;
			}

			.message:hover .copy-button {
				opacity: 1;
			}

			.copy-button:hover {
				background: rgba(255, 255, 255, 0.9);
			}

			/* Markdown styles */
			.message code {
				background: rgba(0, 0, 0, 0.1);
				padding: 0.125rem 0.25rem;
				border-radius: 3px;
				font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
				font-size: 0.9em;
			}

			.message pre {
				background: rgba(0, 0, 0, 0.1);
				padding: 0.75rem;
				border-radius: 4px;
				overflow-x: auto;
				margin: 0.5rem 0;
			}

			.message pre code {
				background: none;
				padding: 0;
			}

			.message blockquote {
				border-left: 3px solid var(--primary-color);
				padding-left: 0.75rem;
				margin: 0.5rem 0;
				color: var(--text-light);
			}

			.message strong {
				font-weight: bold;
			}

			.message em {
				font-style: italic;
			}

			.message ul, .message ol {
				margin: 0.5rem 0;
				padding-left: 1.5rem;
			}

			.message li {
				margin: 0.25rem 0;
			}

			.message a {
				color: var(--primary-color);
				text-decoration: underline;
			}

			.message a:hover {
				color: var(--primary-hover);
			}

			body.dark {
				background-color: #111827;
				color: white;
			}

			body.dark .chat-container {
				background: #1f2937;
			}

			body.dark .message.bot {
				background: #374151;
			}

			body.dark input {
				background: #1f2937;
				color: white;
				border: 1px solid #555;
			}

			body.dark .copy-button {
				background: rgba(31, 41, 55, 0.8);
				border-color: #555;
				color: white;
			}

			body.dark .copy-button:hover {
				background: rgba(31, 41, 55, 0.9);
			}

			body.dark .message code {
				background: rgba(255, 255, 255, 0.1);
			}

			body.dark .message pre {
				background: rgba(255, 255, 255, 0.1);
			}
		</style>
	</head>
	<body>
		<header>
			<div style="display: flex; justify-content: space-between; align-items: center;">
				<div>
					<h1>Cloudflare AI Chat</h1>
					<p>Powered by Cloudflare Workers AI</p>
				</div>
				<div style="display: flex; gap: 0.5rem;">
					<button id="newChatButton" style="background: var(--primary-color); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;">New Chat</button>
					<button id="themeToggle" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">🌙</button>
				</div>
			</div>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
			</div>

			<div class="typing-indicator" id="typing-indicator">
				AI is thinking...
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Type your message here..."
					rows="1"
					autofocus
				></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<footer>
			<p>Cloudflare Workers AI Chat Template &copy; 2025</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
